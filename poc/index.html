<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pushup PoC</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #eee;
        font-family: -apple-system, system-ui, sans-serif;
        height: 100%;
      }
      #stage {
        position: relative;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        background: #000;
      }
      #video, #overlay {
        width: 100%;
        height: auto;
        display: block;
        transform: scaleX(-1);
      }
      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #hud {
        max-width: 1280px;
        margin: 12px auto;
        padding: 16px;
        background: #1a1a1a;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
      }
      .stat { display: flex; flex-direction: column; }
      .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
      }
      .value { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; }
      #count .value { color: #4ade80; }
      #status { grid-column: 1 / -1; font-size: 13px; color: #aaa; }
      button {
        background: #333;
        color: #eee;
        border: 1px solid #555;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { background: #444; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <div id="hud">
      <div class="stat" id="count"><span class="label">Count</span><span class="value" id="count-val">0</span></div>
      <div class="stat"><span class="label">State</span><span class="value" id="state-val">—</span></div>
      <div class="stat"><span class="label">L Elbow °</span><span class="value" id="lelbow-val">—</span></div>
      <div class="stat"><span class="label">R Elbow °</span><span class="value" id="relbow-val">—</span></div>
      <div class="stat"><span class="label">Elbow (used) °</span><span class="value" id="elbow-val">—</span></div>
      <div class="stat"><span class="label">&nbsp;</span><button id="reset-btn">Reset</button></div>
      <div id="status">Starting…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
